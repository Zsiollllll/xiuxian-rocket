<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#1a1a4e"/>
    </linearGradient>
    <linearGradient id="rocket" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#ff4500"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <!-- Rocket body -->
  <rect x="52" y="35" width="24" height="45" rx="4" fill="url(#rocket)"/>
  <!-- Rocket nose cone -->
  <polygon points="64,18 52,38 76,38" fill="#ff6b35"/>
  <!-- Rocket fins -->
  <polygon points="52,70 40,85 52,80" fill="#ff4500"/>
  <polygon points="76,70 88,85 76,80" fill="#ff4500"/>
  <!-- Rocket window -->
  <circle cx="64" cy="52" r="6" fill="#0a0a2e"/>
  <circle cx="64" cy="52" r="4" fill="#4fc3f7"/>
  <!-- Flame -->
  <polygon points="58,80 64,105 70,80" fill="#ffeb3b" opacity="0.9"/>
  <polygon points="61,80 64,95 67,80" fill="#ff9800"/>
  <!-- Stars -->
  <circle cx="25" cy="25" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="100" cy="30" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="30" cy="100" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="105" cy="90" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="15" cy="55" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="110" cy="55" r="1" fill="#fff" opacity="0.4"/>
  <!-- Sword (cultivation symbol) -->
  <rect x="20" y="58" width="2.5" height="20" rx="1" fill="#4fc3f7" opacity="0.7" transform="rotate(-15,21,58)"/>
  <rect x="16" y="56" width="10" height="3" rx="1" fill="#4fc3f7" opacity="0.7" transform="rotate(-15,21,58)"/>
</svg>
